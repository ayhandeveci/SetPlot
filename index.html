<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#090b0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SetPlot">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<title>SetPlot V7</title>
</head>
<body>

<main class="app">

<section class="card">
  <p class="eyebrow">Drive Session</p>
  <h1>SetPlot</h1>

  <label>
    Google OAuth Client ID
    <input id="clientId" type="text">
  </label>

  <label>
    Google Drive Folder ID
    <input id="folderId" type="text" value="1HXyoM6evWv7DGNBFKA-j-qsXZ7ei55NG">
  </label>

  <label>
    Google Mail
    <input id="googleMail" type="email" value="ayhan@thacapple.com">
  </label>

  <button id="saveSessionBtn" class="primary">
    Save Session
  </button>

  <button id="connectBtn" class="secondary">
    Connect Google Drive
  </button>

  <div id="statusBox" class="status">
    Waiting...
  </div>
</section>

<section class="card">
  <h2>Workout Selection</h2>

  <div class="grid">
    <button class="workout selected" data-day="Day_A">Day A</button>
    <button class="workout" data-day="Day_B">Day B</button>
    <button class="workout" data-day="Day_C">Day C</button>
  </div>

  <button id="analyzeBtn" class="primary">
    Analyze Previous Logs
  </button>
</section>

<section class="card">
  <h2>Recommendation Engine</h2>

  <div id="recommendationBox">
    Waiting for analysis...
  </div>
</section>

<section class="card">
  <h2>CSV Upload Test</h2>

  <button id="uploadBtn" class="primary">
    Upload Test Workout CSV
  </button>
</section>

</main>

<script src="https://accounts.google.com/gsi/client"></script>
<script src="app.js"></script>

</body>
</html>
